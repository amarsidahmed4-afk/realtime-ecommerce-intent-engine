name: Continuous Deployment to Cloud Run

on:
  push:
    branches:
      - main  # Trigger automation automatically whenever you push code to main

env:
  GCP_PROJECT_ID: gtm-m4299zzd-nti4m
  GCP_REGION: europe-west1               # Safe, low-latency deployment region
  ARTIFACT_REGISTRY_REPO: intent-engine-repo
  SERVICE_NAME: realtime-ecommerce-intent-engine

jobs:
  deploy-to-cloud-run:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Securely pull your latest code repository down into the GitHub Actions runner
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Authenticate with Google Cloud securely via Service Account Credentials
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Step 3: Configure your local runner's terminal to authorize Docker pushes to GCP
      - name: Set up Cloud SDK & Docker Authorization
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # Step 4: Build your production Docker container using GitHub's hardware infrastructure
      - name: Build and Tag Docker Image
        run: |
          docker build -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .

      # Step 5: Push the compiled image into your secure Google Artifact Registry repository
      - name: Push Image to Google Artifact Registry
        run: |
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      # Step 6: Trigger Google Cloud Run to roll out the new code with your exact warm-container spec!
      - name: Deploy to Google Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: |
            --min-instances=1
            --allow-unauthenticated
          env_vars: |
            GCP_PROJECT_ID=gtm-m4299zzd-nti4m
            BQ_DATASET_ID=ml_logs
            BQ_TABLE_ID=intent_predictions_log
